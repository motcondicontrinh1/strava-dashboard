<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Dark Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            overflow: hidden;
        }

        /* ============================================
           BACKGROUND WITH OVERLAY
           ============================================ */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(0px);
            z-index: -1;
        }

        /* ============================================
           MAIN CARD CONTAINER (Glassmorphism)
           ============================================ */
        .login-card {
            width: 540px;
            background: rgba(13, 13, 22, 0.72);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 20px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.08);
            padding: 48px 72px;
            position: relative;
            overflow: hidden;
        }

        /* Gradient border effect */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.25) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0.15) 100%
            );
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Inner glow effect */
        .login-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.2) 50%,
                transparent 100%
            );
            pointer-events: none;
        }

        /* ============================================
           TYPOGRAPHY
           ============================================ */
        .title {
            font-size: 28px;
            font-weight: 600;
            line-height: 28px;
            color: #FAFAFA;
            margin-bottom: 32px;
        }

        /* ============================================
           SOCIAL LOGIN BUTTONS
           ============================================ */
        .social-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .btn-social {
            flex: 1;
            height: 48px;
            background: #26262B;
            border: none;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #A0A0AB;
            transition: all 0.2s ease;
            padding: 16px;
        }

        .btn-social:hover {
            background: #2E2E33;
            color: #D1D1D6;
        }

        .btn-social svg {
            width: 20px;
            height: 20px;
        }

        /* ============================================
           FORM STYLES
           ============================================ */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 400;
            color: #D1D1D6;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            height: 48px;
            background: transparent;
            border: 1px solid #3F3F46;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #D1D1D6;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: #707075;
        }

        .form-input:focus {
            outline: none;
            border-color: #1570EF;
            box-shadow: 0 0 0 3px rgba(21, 112, 239, 0.2);
        }

        .form-input.password {
            padding-right: 48px;
        }

        /* Password Toggle Icon */
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            cursor: pointer;
            color: #707075;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .password-toggle:hover {
            color: #A0A0AB;
        }

        /* ============================================
           SUBMIT BUTTON
           ============================================ */
        .btn-submit {
            width: 100%;
            height: 48px;
            background: #1570EF;
            color: #FCFCFC;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: #1366D9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(21, 112, 239, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            font-size: 16px;
        }

        .footer-text {
            font-weight: 400;
            color: #707075;
        }

        .footer a {
            font-weight: 400;
            color: #A0A0AB;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #FCFCFC;
            text-decoration: underline;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 600px) {
            .login-card {
                width: 100%;
                max-width: 540px;
                margin: 16px;
                padding: 40px 32px;
            }
            
            .social-buttons {
                flex-direction: column;
            }
            
            .title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Layer -->
    <div class="background"></div>
    <div class="background-overlay"></div>

    <!-- Main Card -->
    <div class="login-card">
        <!-- Title -->
        <h1 class="title">Create an account</h1>

        <!-- Social Login Buttons -->
        <div class="social-buttons">
            <button class="btn-social" type="button">
                <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M19.64 9.2c0-.637-.057-1.251-.164-1.84H10v3.481h5.388c-.209 1.125-.842 2.08-1.794 2.717v2.258h2.908c1.702-1.566 2.684-3.874 2.684-6.616z"/>
                    <path fill="#34A853" d="M10 20c2.43 0 4.467-.806 5.956-2.18l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 10 20z"/>
                    <path fill="#FBBC05" d="M4.964 11.71A5.41 5.41 0 0 1 4.682 10c0-.593.102-1.165.282-1.71V5.958H.957A8.996 8.996 0 0 0 0 10c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
                    <path fill="#EA4335" d="M10 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C14.463.892 12.426 0 10 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                Google
            </button>
            <button class="btn-social" type="button">
                <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#1877F2" d="M20 10c0-5.523-4.477-10-10-10S0 4.477 0 10c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V10h2.54V7.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V10h2.773l-.443 2.89h-2.33v6.988C16.343 19.128 20 14.991 20 10z"/>
                </svg>
                Facebook
            </button>
        </div>

        <!-- Form -->
        <form id="loginForm">
            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="you@example.com"
                    required
                >
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input password" 
                        placeholder="Enter your password"
                        required
                    >
                    <span class="password-toggle" id="togglePassword" title="Show password">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit">Create account</button>
        </form>

        <!-- Footer -->
        <div class="footer">
            <span class="footer-text">Already have an account ?</span>
            <a href="#">Log in</a>
        </div>
    </div>

    <script>
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Update icon
            if (type === 'text') {
                this.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>`;
                this.title = 'Hide password';
            } else {
                this.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>`;
                this.title = 'Show password';
            }
        });

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Account creation submitted! (Demo)');
        });
    </script>
</body>
</html>
