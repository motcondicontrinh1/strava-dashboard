<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Create an Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #F9FAFB;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================
           MAIN CARD CONTAINER
           ============================================ */
        .signup-card {
            width: 448px;
            background: #FFFFFF;
            border-radius: 16px;
            border: 1px solid #F3F4F6;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            padding: 41px;
        }

        /* ============================================
           TYPOGRAPHY
           ============================================ */
        .title {
            font-size: 24px;
            font-weight: 700;
            line-height: 32px;
            color: #111827;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 14px;
            font-weight: 400;
            line-height: 20px;
            color: #6B7280;
            margin-bottom: 32px;
        }

        /* ============================================
           GOOGLE BUTTON
           ============================================ */
        .btn-google {
            width: 100%;
            height: 42px;
            background: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            transition: all 0.2s ease;
        }

        .btn-google:hover {
            background: #F9FAFB;
            border-color: #D1D5DB;
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        /* ============================================
           DIVIDER
           ============================================ */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #F3F4F6;
        }

        .divider-text {
            font-size: 12px;
            font-weight: 400;
            color: #9CA3AF;
            white-space: nowrap;
        }

        /* ============================================
           FORM STYLES
           ============================================ */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #4B5563;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            height: 42px;
            background: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 10px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #111827;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: #D1D5DB;
        }

        .form-input:focus {
            outline: none;
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-input.password {
            padding-right: 40px;
        }

        /* Password Strength Bar */
        .password-strength {
            height: 4px;
            background: #F3F4F6;
            border-radius: 9999px;
            margin-top: 6px;
            margin-bottom: 6px;
            overflow: hidden;
        }

        .password-strength-fill {
            height: 100%;
            width: 0;
            background: #4F46E5;
            border-radius: 9999px;
            transition: width 0.3s ease;
        }

        /* Password Toggle Icon */
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            cursor: pointer;
            color: #9CA3AF;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #6B7280;
        }

        /* ============================================
           SUBMIT BUTTON
           ============================================ */
        .btn-submit {
            width: 100%;
            height: 40px;
            background: #4F46E5;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: #4338CA;
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            font-weight: 400;
            color: #9CA3AF;
        }

        .footer a {
            color: #4F46E5;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #4338CA;
            text-decoration: underline;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            
            .signup-card {
                width: 100%;
                max-width: 448px;
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <!-- Header -->
        <h1 class="title">Create an account</h1>
        <p class="subtitle">Get started for free — no credit card required.</p>

        <!-- Google Button -->
        <button class="btn-google" type="button">
            <svg class="google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.842 2.08-1.794 2.717v2.258h2.908c1.702-1.566 2.684-3.874 2.684-6.616z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
                <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.165.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
                <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.892 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
            </svg>
            Continue with Google
        </button>

        <!-- Divider -->
        <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-text">or</span>
            <span class="divider-line"></span>
        </div>

        <!-- Form -->
        <form id="signupForm">
            <!-- Full Name -->
            <div class="form-group">
                <label class="form-label" for="fullName">Full name</label>
                <input 
                    type="text" 
                    id="fullName" 
                    class="form-input" 
                    placeholder="Jane Smith"
                    required
                >
            </div>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="you@example.com"
                    required
                >
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <!-- Password Strength Bar -->
                <div class="password-strength">
                    <div class="password-strength-fill" id="strengthFill"></div>
                </div>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input password" 
                        placeholder="At least 8 characters"
                        minlength="8"
                        required
                    >
                    <span class="password-toggle" id="togglePassword" title="Show password">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit">Create account</button>
        </form>

        <!-- Footer -->
        <div class="footer">
            Already have an account? <a href="#">Sign in</a>
        </div>
    </div>

    <script>
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Update icon
            if (type === 'text') {
                this.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>`;
                this.title = 'Hide password';
            } else {
                this.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>`;
                this.title = 'Show password';
            }
        });

        // Password strength indicator
        const strengthFill = document.getElementById('strengthFill');
        passwordInput.addEventListener('input', function() {
            const value = this.value;
            let strength = 0;
            
            if (value.length >= 8) strength += 25;
            if (value.length >= 12) strength += 25;
            if (/[A-Z]/.test(value)) strength += 25;
            if (/[0-9]/.test(value) || /[^A-Za-z0-9]/.test(value)) strength += 25;
            
            strengthFill.style.width = strength + '%';
            
            // Change color based on strength
            if (strength < 50) {
                strengthFill.style.background = '#EF4444';
            } else if (strength < 75) {
                strengthFill.style.background = '#F59E0B';
            } else {
                strengthFill.style.background = '#4F46E5';
            }
        });

        // Form submission
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Account creation submitted! (Demo)');
        });
    </script>
</body>
</html>
